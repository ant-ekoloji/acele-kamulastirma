<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Acele Kamulaştırma Portalı | v10</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7fa; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #1e2a3a; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 3; height: 100%; background: #e9f0f5; }
        
        .sidebar { flex: 1; background: white; border-left: 1px solid #ccc; overflow-y: auto; padding: 12px; min-width: 300px; display: flex; flex-direction: column; gap: 12px; }
        h4 { margin: 0 0 5px 0; font-size: 0.9rem; border-bottom: 2px solid #3498db; display: inline-block; color: #2c3e50; }

        .filter-section { background: #f8f9fa; padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.7rem; }

        .stats-panel { background: #f1f4f9; border-radius: 6px; padding: 6px; border: 1px solid #d1d9e6; max-height: 120px; overflow-y: auto; }
        .city-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 3px 0; border-bottom: 1px solid #e0e6ed; }

        .record-list-container { flex: 1; overflow-y: auto; }
        .record-card { background: #fff; border-left: 4px solid #3498db; padding: 6px; margin-bottom: 6px; border-radius: 4px; border: 1px solid #eee; cursor: pointer; transition: all 0.2s; }
        .record-card:hover { background: #f8f9fa; transform: translateX(2px); }
        .record-card b { display: block; font-weight: 500; font-size: 0.75rem; color: #2c3e50; line-height: 1.2; }
        .record-card small { font-size: 0.65rem; color: #666; }

        .admin-section { background: #fff3e0; padding: 10px; border-radius: 6px; border: 1px dashed #fb8c00; font-size: 0.75rem; }
        input, select { width: 100%; padding: 5px; margin: 3px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 0.75rem; }
        .btn { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; transition: all 0.2s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-blue:hover { background: #2980b9; }
        .hidden { display: none !important; }
        
        @media (max-width: 768px) { .main-content { flex-direction: column; } .sidebar { max-height: 50%; } }
        
        .loading { text-align: center; padding: 20px; color: #666; }
        .info-message { background: #e8f0fe; padding: 8px; border-radius: 4px; font-size: 0.7rem; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar">
        <h4 style="color:white; border:none; margin:0">🏗️ Kamulaştırma Portalı</h4>
        <div id="statsCount" style="font-size:0.75rem">Bağlanıyor...</div>
        <div>
            <button class="btn btn-blue" id="loginBtn">🔐 Admin</button>
            <button class="btn" id="logoutBtn" style="background:#e74c3c; color:white; display:none;">Çıkış</button>
        </div>
    </div>

    <div class="main-content">
        <div id="map"></div>
        <div class="sidebar">
            <div class="filter-section">
                <h4>🔍 Filtrele</h4>
                <div id="categoryFilters" class="filter-group"></div>
                <div class="info-message">✓ Filtreleri kullanarak projeleri görüntüleyin</div>
            </div>

            <div>
                <h4>📊 Şehir İstatistikleri</h4>
                <div id="cityStats" class="stats-panel">Veri bekleniyor...</div>
            </div>

            <div class="record-list-container">
                <h4>📌 Karar Listesi</h4>
                <div id="recordList"></div>
            </div>

            <div id="adminControls" class="admin-section hidden">
                <h4>✍️ Yönetici Paneli</h4>
                <input type="text" id="projeAdi" placeholder="Proje Adı *">
                <input type="text" id="kararNo" placeholder="Karar No">
                <input type="text" id="sehirInput" placeholder="İl *">
                <input type="text" id="coordsInput" placeholder="Koordinat (Haritadan çizin)" readonly>
                <select id="kategoriSelect"></select>
                <button class="btn btn-blue" style="width:100%; margin-top:5px;" id="saveBtn">💾 Kaydet</button>
                <div class="info-message" style="margin-top:5px;">✏️ Yeni proje eklemek için haritaya tıklayıp alan çizin</div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // Firebase Yapılandırması
    const firebaseConfig = {
        apiKey: "AIzaSyBuOrH2wjN1WxY4JqVZcXqZP2VfV8vWcE",
        authDomain: "acele-kumulastirma.firebaseapp.com",
        databaseURL: "https://acele-kumulastirma-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "acele-kumulastirma",
        storageBucket: "acele-kumulastirma.appspot.com",
        messagingSenderId: "935988668675",
        appId: "1:935988668675:web:c934a82fbfafc7f5512136"
    };

    // Firebase'i başlat
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kamulastirma");

    // Kategori renkleri
    const COLORS = { 
        "Konut": "#2ecc71", 
        "Altyapı": "#3498db", 
        "Ulaşım": "#f39c12", 
        "Enerji": "#e67e22", 
        "Kentsel Dönüşüm": "#9b59b6", 
        "Diğer": "#7f8c8d" 
    };
    
    // Global değişkenler
    let map, kamulastirmaData = [], selectedCategories = new Set(Object.keys(COLORS));
    let drawnItems; // Çizim katmanı için

    // Haritayı başlat
    function initMap() {
        // Haritayı oluştur
        map = L.map('map').setView([39.0, 35.0], 6);
        
        // Temel harita katmanı
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        // Çizim katmanını oluştur
        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        
        // Türkiye sınırlarını yaklaşık olarak göster
        const turkeyBounds = L.latLngBounds(
            L.latLng(35.5, 25.5),
            L.latLng(42.5, 45.0)
        );
        map.fitBounds(turkeyBounds);
        
        // Hata ayıklama için
        console.log("Harita başlatıldı");
    }

    // Verileri güncelle ve haritayı göster
    function updateView() {
        if (!map) {
            console.error("Harita henüz başlatılmadı");
            return;
        }
        
        // Önce mevcut tüm katmanları temizle (çizim katmanını koru)
        map.eachLayer(layer => {
            if (layer !== drawnItems && layer !== map._layers[Object.keys(map._layers)[0]]) {
                // TileLayer'ı koru, diğerlerini temizle
                if (!(layer instanceof L.TileLayer)) {
                    map.removeLayer(layer);
                }
            }
        });
        
        // Filtrelenmiş veriler
        const filtered = kamulastirmaData.filter(d => selectedCategories.has(d.kategori));
        
        // Şehir istatistikleri
        const cityCounts = {};
        
        // Verileri haritaya ekle
        filtered.forEach((d, index) => {
            const city = d.tahmini_konum || "Diğer";
            cityCounts[city] = (cityCounts[city] || 0) + 1;
            
            try {
                let layer;
                
                // Koordinat kontrolü
                if (d.coordinates && Array.isArray(d.coordinates)) {
                    // Poligon kontrolü (3 boyutlu array)
                    if (d.coordinates.length > 0 && Array.isArray(d.coordinates[0]) && d.coordinates[0].length > 0 && Array.isArray(d.coordinates[0][0])) {
                        // Poligon verisi
                        layer = L.polygon(d.coordinates, {
                            color: COLORS[d.kategori],
                            weight: 2,
                            fillOpacity: 0.4,
                            fillColor: COLORS[d.kategori]
                        });
                    } 
                    // Nokta verisi (enlem, boylam)
                    else if (d.coordinates.length === 2 && typeof d.coordinates[0] === 'number') {
                        layer = L.circleMarker([d.coordinates[1], d.coordinates[0]], {
                            radius: 7,
                            fillColor: COLORS[d.kategori],
                            color: "#000",
                            weight: 1.5,
                            fillOpacity: 0.8
                        });
                    }
                }
                
                if (layer) {
                    // Popup içeriği
                    const rgUrl = d.karar_no ? `https://www.resmigazete.gov.tr/eskiler/ara.php?karar=${d.karar_no}` : '#';
                    const popupContent = `
                        <div style="min-width:200px;">
                            <b style="font-size:14px;">${d.proje_adi || 'İsimsiz Proje'}</b><br>
                            <span style="font-size:12px;">Karar: ${d.karar_no || 'Belirtilmemiş'}</span><br>
                            <span style="font-size:12px;">İl: ${d.tahmini_konum || 'Belirtilmemiş'}</span><br>
                            <span style="font-size:12px;">Kategori: ${d.kategori || 'Belirtilmemiş'}</span><br>
                            ${d.karar_no ? `<a href="${rgUrl}" target="_blank" style="color:#e74c3c; font-weight:bold; font-size:12px;">📰 Resmî Gazete'de Ara</a>` : ''}
                        </div>
                    `;
                    layer.bindPopup(popupContent);
                    layer.on('click', () => {
                        const center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
                        map.setView(center, 12);
                    });
                    layer.addTo(map);
                }
            } catch (err) {
                console.error("Katman eklenirken hata:", err, d);
            }
        });
        
        // Şehir istatistiklerini güncelle
        const cityStatsHtml = Object.entries(cityCounts)
            .sort((a, b) => b[1] - a[1])
            .map(([city, count]) => `<div class="city-item"><span>${city}</span><b>${count}</b></div>`)
            .join('');
        
        document.getElementById('cityStats').innerHTML = cityStatsHtml || "<div style='text-align:center;'>Veri yok</div>";
        
        // Karar listesini güncelle
        const recordListHtml = filtered.map(d => `
            <div class="record-card" style="border-left-color:${COLORS[d.kategori]}" onclick="focusOnProject('${d.proje_adi?.replace(/'/g, "\\'") || ''}')">
                <b>${d.proje_adi || 'İsimsiz Proje'}</b>
                <small>${d.tahmini_konum || 'Belirtilmemiş'} - ${d.karar_no || 'Karar No yok'}</small>
            </div>
        `).join('');
        
        document.getElementById('recordList').innerHTML = recordListHtml || "<div style='text-align:center; padding:20px;'>Kayıt bulunamadı</div>";
        
        // İstatistik sayısını güncelle
        document.getElementById('statsCount').innerHTML = `${filtered.length} Aktif Kayıt`;
        
        console.log(`Görünüm güncellendi: ${filtered.length} kayıt gösteriliyor`);
    }

    // Projeye odaklan
    window.focusOnProject = (name) => {
        if (!name) return;
        const item = kamulastirmaData.find(d => d.proje_adi === name);
        if (item && item.coordinates) {
            try {
                let center;
                if (Array.isArray(item.coordinates[0]) && item.coordinates[0].length > 0 && Array.isArray(item.coordinates[0][0])) {
                    // Poligon merkezi
                    const bounds = L.latLngBounds(item.coordinates[0]);
                    center = bounds.getCenter();
                } else if (item.coordinates.length === 2) {
                    // Nokta
                    center = L.latLng(item.coordinates[1], item.coordinates[0]);
                }
                if (center) {
                    map.setView(center, 12);
                    // Popup'ı aç
                    const layers = [];
                    map.eachLayer(layer => {
                        if (layer.getPopup && layer.getPopup()) {
                            layers.push(layer);
                        }
                    });
                }
            } catch (err) {
                console.error("Odaklanma hatası:", err);
            }
        }
    };

    // Admin girişi
    document.getElementById('loginBtn').onclick = () => {
        const password = prompt("Yönetici şifresini giriniz:");
        if (password === "admin123") {
            document.getElementById('adminControls').classList.remove('hidden');
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('loginBtn').classList.add('hidden');
            
            // Draw kontrolünü ekle
            const drawControl = new L.Control.Draw({
                edit: { featureGroup: drawnItems },
                draw: { 
                    polygon: true, 
                    marker: false, 
                    rectangle: true, 
                    circle: false, 
                    polyline: false,
                    circlemarker: false
                }
            });
            map.addControl(drawControl);
            
            alert("Admin paneline hoş geldiniz! Haritaya tıklayarak yeni proje alanı çizebilirsiniz.");
        } else if (password !== null) {
            alert("Hatalı şifre!");
        }
    };
    
    // Çıkış
    document.getElementById('logoutBtn').onclick = () => {
        location.reload();
    };
    
    // Çizim olayı
    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        const layer = e.layer;
        drawnItems.addLayer(layer);
        
        // Koordinatları al
        let coordinates;
        if (layer instanceof L.Polygon) {
            coordinates = layer.getLatLngs()[0].map(latlng => [latlng.lng, latlng.lat]);
        } else if (layer instanceof L.Rectangle) {
            coordinates = layer.getBounds().toBBoxString().split(',').map(Number);
        } else {
            coordinates = [layer.getLatLng().lng, layer.getLatLng().lat];
        }
        
        document.getElementById('coordsInput').value = JSON.stringify(coordinates);
        alert("Alan çizildi! Şimdi proje bilgilerini doldurup kaydedebilirsiniz.");
    });
    
    // Kaydet butonu
    document.getElementById('saveBtn').onclick = async () => {
        const projeAdi = document.getElementById('projeAdi').value.trim();
        const sehir = document.getElementById('sehirInput').value.trim();
        const coords = document.getElementById('coordsInput').value;
        
        if (!projeAdi) {
            alert("Lütfen proje adını giriniz!");
            return;
        }
        if (!sehir) {
            alert("Lütfen il bilgisini giriniz!");
            return;
        }
        if (!coords) {
            alert("Lütfen haritadan bir alan çiziniz!");
            return;
        }
        
        try {
            const coordinates = JSON.parse(coords);
            const newRecord = {
                proje_adi: projeAdi,
                karar_no: document.getElementById('kararNo').value.trim() || "Belirtilmemiş",
                tahmini_konum: sehir,
                coordinates: coordinates,
                kategori: document.getElementById('kategoriSelect').value,
                tarih: new Date().toISOString()
            };
            
            await db.push(newRecord);
            alert("✅ Proje başarıyla kaydedildi!");
            
            // Formu temizle
            document.getElementById('projeAdi').value = "";
            document.getElementById('kararNo').value = "";
            document.getElementById('sehirInput').value = "";
            document.getElementById('coordsInput').value = "";
            drawnItems.clearLayers();
            
        } catch (err) {
            console.error("Kayıt hatası:", err);
            alert("Kayıt sırasında bir hata oluştu!");
        }
    };
    
    // Kategori filtrelerini oluştur
    Object.keys(COLORS).forEach(category => {
        document.getElementById('categoryFilters').innerHTML += `
            <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                <input type="checkbox" checked onchange="toggleCategory('${category}', this.checked)">
                <span style="display:inline-block; width:12px; height:12px; background:${COLORS[category]}; border-radius:2px;"></span>
                ${category}
            </label>
        `;
        document.getElementById('kategoriSelect').innerHTML += `<option value="${category}">${category}</option>`;
    });
    
    // Kategori toggle fonksiyonu
    window.toggleCategory = (category, isChecked) => {
        if (isChecked) {
            selectedCategories.add(category);
        } else {
            selectedCategories.delete(category);
        }
        updateView();
    };
    
    // Firebase verilerini dinle
    db.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) {
            kamulastirmaData = Object.values(val);
            console.log(`Firebase'den ${kamulastirmaData.length} kayıt yüklendi`);
        } else {
            kamulastirmaData = [];
            console.log("Firebase'de veri bulunamadı");
        }
        updateView();
    }, (error) => {
        console.error("Firebase okuma hatası:", error);
        document.getElementById('statsCount').innerHTML = "Bağlantı hatası";
        document.getElementById('recordList').innerHTML = "<div class='loading'>⚠️ Veritabanı bağlantı hatası. Lütfen Firebase yapılandırmasını kontrol edin.</div>";
    });
    
    // Sayfa yüklendiğinde haritayı başlat
    initMap();
    
    // Konsola başlangıç mesajı
    console.log("Uygulama başlatıldı. Firebase verileri bekleniyor...");
</script>
</body>
</html>
