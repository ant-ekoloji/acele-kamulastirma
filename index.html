<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Acele Kamulaştırma Portalı | v7</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7fa; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #1e2a3a; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 3; height: 100%; background: #e0e0e0; }
        
        .sidebar { flex: 1; background: white; border-left: 1px solid #ccc; overflow-y: auto; padding: 12px; min-width: 300px; display: flex; flex-direction: column; gap: 10px; }
        h4 { margin: 0 0 5px 0; font-size: 0.85rem; border-bottom: 2px solid #3498db; color: #1e2a3a; padding-bottom: 2px; }

        /* Filtreler */
        .filter-section { background: #f8f9fa; padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.7rem; }

        /* İstatistikler (Scroll'lu) */
        .stats-panel { background: #f1f4f9; border-radius: 6px; padding: 5px; border: 1px solid #d1d9e6; max-height: 110px; overflow-y: auto; }
        .city-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 3px 0; border-bottom: 1px solid #e0e6ed; }

        /* Karar Listesi */
        .record-list-container { flex: 1; overflow-y: auto; }
        .record-card { background: #fff; border-left: 4px solid #3498db; padding: 6px; margin-bottom: 6px; border-radius: 4px; border: 1px solid #eee; cursor: pointer; }
        .record-card:hover { background: #f0f7ff; }
        .record-card b { display: block; font-size: 0.75rem; color: #2c3e50; line-height: 1.2; font-weight: 500; }
        .record-card small { font-size: 0.65rem; color: #666; font-weight: normal; }

        /* Admin Alanı */
        .admin-box { background: #fff3e0; padding: 10px; border-radius: 6px; border: 1px dashed #fb8c00; font-size: 0.75rem; }
        input, select { width: 100%; padding: 5px; margin: 3px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 0.75rem; }
        .btn { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .btn-blue { background: #3498db; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar">
        <h3 style="margin:0; font-size:0.9rem;">🏗️ Acele Kamulaştırma Portalı</h3>
        <div id="statsCount" style="font-size:0.75rem">Yükleniyor...</div>
        <div>
            <button class="btn btn-blue" id="loginBtn">🔐 Admin</button>
            <button class="btn" id="logoutBtn" style="background:#e74c3c; color:white;" class="hidden" onclick="location.reload()">Çıkış</button>
        </div>
    </div>

    <div class="main-content">
        <div id="map"></div>
        <div class="sidebar">
            <div class="filter-section">
                <h4>🔍 Filtrele</h4>
                <div id="categoryFilters" class="filter-group"></div>
            </div>

            <div>
                <h4>📊 Şehir Dağılımı</h4>
                <div id="cityStats" class="stats-panel">Veri yok.</div>
            </div>

            <div class="record-list-container">
                <h4>📌 Karar Listesi</h4>
                <div id="recordList"></div>
            </div>

            <div id="adminControls" class="admin-box hidden">
                <h4>✍️ Veri Girişi</h4>
                <input type="text" id="projeAdi" placeholder="Proje Adı">
                <input type="text" id="kararNo" placeholder="Karar No">
                <input type="text" id="sehirInput" placeholder="Şehir">
                <input type="text" id="coordsInput" placeholder="Koordinat (Çizimle Dolar)" readonly>
                <select id="kategoriSelect"></select>
                <button class="btn btn-blue" style="width:100%; margin-top:5px;" id="saveBtn">💾 Kaydet</button>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCfrZFOzg_an5WBFARS_1cB4Q3pfRguz8E",
        authDomain: "acele-kumulastirma.firebaseapp.com",
        databaseURL: "https://acele-kumulastirma-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "acele-kumulastirma",
        storageBucket: "acele-kumulastirma.firebasestorage.app",
        messagingSenderId: "935988668675",
        appId: "1:935988668675:web:c934a82fbfafc7f5512136"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref("kamulastirma");

    const COLORS = { "Konut": "#2ecc71", "Altyapı": "#3498db", "Ulaşım": "#f39c12", "Enerji": "#e67e22", "Kentsel Dönüşüm": "#9b59b6", "Diğer": "#7f8c8d" };
    let map, kamulastirmaData = [], drawnItems, selectedCategories = new Set(Object.keys(COLORS));

    // HARİTA BAŞLATMA
    function initMap() {
        map = L.map('map');
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        L.control.layers({ "Harita": osm, "Uydu": satellite }).addTo(map);
        
        // Türkiye yatay sığdırma (İsteğiniz)
        map.fitBounds(L.latLngBounds(L.latLng(35.5, 25.5), L.latLng(42.5, 45.0)));
        drawnItems = new L.FeatureGroup().addTo(map);
    }

    // VERİLERİ EKRANA BASMA (GÜVENLİ DÖNGÜ)
    function refreshUI() {
        if (!map) return;
        
        // Önceki markerları temizle
        map.eachLayer(l => { if(l instanceof L.CircleMarker || l instanceof L.GeoJSON) map.removeLayer(l); });

        const filtered = kamulastirmaData.filter(d => selectedCategories.has(d.kategori));
        const cityMap = {};

        filtered.forEach(d => {
            if (!d.coordinates) return;

            // Şehir İstatistiği
            const c = d.tahmini_konum || "Diğer";
            cityMap[c] = (cityMap[c] || 0) + 1;

            // Marker veya Poligon Oluşturma
            try {
                let layer;
                if (Array.isArray(d.coordinates[0])) { // Poligon
                    layer = L.geoJSON({ type: "Feature", geometry: { type: "Polygon", coordinates: d.coordinates } }, {
                        style: { color: COLORS[d.kategori], weight: 2, fillOpacity: 0.4 }
                    });
                } else { // Nokta
                    layer = L.circleMarker([d.coordinates[1], d.coordinates[0]], { radius: 6, fillColor: COLORS[d.kategori], color: "#000", weight: 1, fillOpacity: 0.8 });
                }

                const rgLink = `https://www.resmigazete.gov.tr/eskiler/ara.php?karar=${d.karar_no || d.karar_sayisi || ''}`;
                layer.bindPopup(`<b>${d.proje_adi}</b><br>Karar: ${d.karar_no || d.karar_sayisi}<br><a href="${rgLink}" target="_blank" style="color:red;font-weight:bold;">📰 Resmî Gazete Ara</a>`);
                
                layer.on('click', () => {
                    const center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
                    map.setView(center, 12);
                });
                layer.addTo(map);
            } catch (e) { console.error("Çizim hatası:", e); }
        });

        // Şehirler (Scroll'lu)
        document.getElementById('cityStats').innerHTML = Object.entries(cityMap)
            .sort((a,b) => b[1] - a[1])
            .map(([name, count]) => `<div class="city-item"><span>${name}</span><b>${count}</b></div>`).join('') || "Veri yok.";

        // Karar Listesi (Küçük Font)
        document.getElementById('recordList').innerHTML = filtered.map(d => `
            <div class="record-card" style="border-left-color:${COLORS[d.kategori]}" onclick="zoomTo('${d.proje_adi}')">
                <b>${d.proje_adi}</b>
                <small>${d.tahmini_konum || ''} - No: ${d.karar_no || d.karar_sayisi || '-'}</small>
            </div>
        `).join('') || "Liste boş.";

        document.getElementById('statsCount').innerText = `${filtered.length} Kayıt Gösteriliyor`;
    }

    window.zoomTo = (pName) => {
        const item = kamulastirmaData.find(x => x.proje_adi === pName);
        if(item) {
            const isPoly = Array.isArray(item.coordinates[0]);
            const loc = isPoly ? [item.coordinates[0][0][1], item.coordinates[0][0][0]] : [item.coordinates[1], item.coordinates[0]];
            map.setView(loc, 12);
        }
    };

    // ADMIN Girişi
    document.getElementById('loginBtn').onclick = () => {
        if(prompt("Admin Şifresi:") === "admin123") {
            document.getElementById('adminControls').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loginBtn').classList.add('hidden');
            const dc = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { circle:false, polyline:false, circlemarker:false } });
            map.addControl(dc);
        }
    };

    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        drawnItems.addLayer(e.layer);
        document.getElementById('coordsInput').value = JSON.stringify(e.layer.toGeoJSON().geometry.coordinates);
    });

    document.getElementById('saveBtn').onclick = async () => {
        const cRaw = document.getElementById('coordsInput').value;
        const name = document.getElementById('projeAdi').value;
        if(!cRaw || !name) return alert("Alan çizin ve proje ismi girin!");
        
        await dbRef.push({
            proje_adi: name,
            karar_no: document.getElementById('kararNo').value,
            tahmini_konum: document.getElementById('sehirInput').value,
            coordinates: JSON.parse(cRaw),
            kategori: document.getElementById('kategoriSelect').value
        });
        alert("Kaydedildi.");
        location.reload();
    };

    // BAŞLAT
    initMap();
    Object.keys(COLORS).forEach(c => {
        document.getElementById('categoryFilters').innerHTML += `<label style="display:flex;align-items:center;gap:3px;"><input type="checkbox" checked onchange="toggleCat('${c}', this.checked)"> ${c}</label>`;
        document.getElementById('kategoriSelect').innerHTML += `<option value="${c}">${c}</option>`;
    });
    window.toggleCat = (c, s) => { s ? selectedCategories.add(c) : selectedCategories.delete(c); refreshUI(); };
    
    // VERİ DİNLEME
    dbRef.on('value', snapshot => {
        const val = snapshot.val();
        if(val) {
            kamulastirmaData = Object.values(val);
            refreshUI();
        } else {
            document.getElementById('statsCount').innerText = "Veritabanı Boş";
        }
    }, err => {
        console.error("Firebase Hatası:", err);
        document.getElementById('statsCount').innerText = "Bağlantı Hatası!";
    });

</script>
</body>
</html>
