<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Acele Kamulaştırma Haritası | Firebase Tabanlı</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7fa; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #1e2a3a; color: white; padding: 10px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10; }
        .title h1 { margin: 0; font-size: 1.2rem; font-weight: 500; }
        .stats { background: #2c3e4e; padding: 5px 12px; border-radius: 30px; font-size: 0.85rem; }
        .btn { border: none; color: white; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.85rem; }
        .btn-add { background: #2ecc71; }
        .btn-import { background: #f39c12; }
        .btn-restore { background: #9b59b6; }
        .btn-login { background: #3498db; }
        .btn-logout { background: #e74c3c; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 3; height: 100%; }
        .sidebar { flex: 1; background: white; border-left: 1px solid #ccc; overflow-y: auto; padding: 15px; min-width: 280px; }
        .filter-section { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .filter-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .legend { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.8rem; border: 1px solid #ddd; }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
        .legend-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; border: 1px solid rgba(0,0,0,0.2); }
        .record-list { max-height: 300px; overflow-y: auto; font-size: 0.8rem; }
        .record-card { background: #fefefe; border-left: 4px solid #3498db; padding: 8px; margin-bottom: 8px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .form-panel { background: #f9f9fc; border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-top: 15px; }
        .form-panel input, .form-panel select { width: 100%; padding: 6px; margin: 5px 0 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .main-content { flex-direction: column; } .sidebar { max-height: 40%; } #map { min-height: 300px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <div class="title"><h1>🏗️ Acele Kamulaştırma Kararları</h1></div>
        <div class="stats" id="statsText">Yükleniyor...</div>
        <div style="display: flex; gap: 8px;">
            <div id="adminControls" class="admin-only hidden">
                <button class="btn btn-add" id="showAddFormBtn">➕ Yeni Ekle</button>
                <button class="btn btn-import" id="importBtn">📁 İçe Aktar</button>
                <input type="file" id="fileInput" accept=".json,.geojson" style="display: none;" />
                <button class="btn btn-restore" id="restoreLocalBtn">💾 Geri Yükle</button>
            </div>
            <button class="btn btn-login" id="loginBtn">🔐 Admin</button>
            <button class="btn btn-logout hidden" id="logoutBtn">🚪 Çıkış</button>
        </div>
    </div>
    <div class="main-content">
        <div id="map"></div>
        <div class="sidebar">
            <h3>🔍 Filtre</h3>
            <div class="filter-section">
                <div id="categoryFilters" class="filter-group"></div>
                <div style="margin-top:10px;"><button id="selectAllBtn">Tümü</button> <button id="clearAllBtn">Temizle</button></div>
            </div>
            <h3>📋 Renkler</h3>
            <div class="legend" id="legendContainer"></div>
            <h3>📌 Kayıt Listesi</h3>
            <div id="recordList" class="record-list"></div>
            <div id="addFormContainer" class="admin-only hidden">
                <div class="form-panel">
                    <h4>Yeni Kayıt</h4>
                    <input type="text" id="projeAdi" placeholder="Proje Adı">
                    <input type="text" id="kararSayisi" placeholder="Karar No">
                    <input type="text" id="coord" placeholder="Enlem, Boylam">
                    <select id="kategoriSelect"></select>
                    <button class="btn btn-add" id="saveRecordBtn">Kaydet</button>
                    <button id="cancelAddBtn">İptal</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCfrZFOzg_an5WBFARS_1cB4Q3pfRguz8E",
        authDomain: "acele-kumulastirma.firebaseapp.com",
        databaseURL: "https://acele-kumulastirma-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "acele-kumulastirma",
        storageBucket: "acele-kumulastirma.firebasestorage.app",
        messagingSenderId: "935988668675",
        appId: "1:935988668675:web:c934a82fbfafc7f5512136"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const recordsRef = database.ref("kamulastirma");

    const CATEGORY_COLORS = {
        "Konut": "#2ecc71", "Altyapı": "#3498db", "Ulaşım": "#f39c12", "Enerji": "#e67e22",
        "Kentsel Dönüşüm": "#9b59b6", "Maden / Petrol": "#95a5a6", "Kıyılar": "#1abc9c",
        "Orman Alanları": "#27ae60", "Tarihi Sit Alanları": "#d35400", "Diğer": "#7f8c8d"
    };

    let map, kamulastirmaData = [], currentMarkers = [], isAdmin = false;
    let selectedCategories = new Set(Object.keys(CATEGORY_COLORS));

    function initMap() {
        map = L.map('map');
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // İlk açılış: Türkiye'yi yatay sığdır
        const turkeyBounds = L.latLngBounds(L.latLng(35.5, 25.5), L.latLng(42.5, 45.0));
        map.fitBounds(turkeyBounds);
    }

    function updateMap() {
        currentMarkers.forEach(m => map.removeLayer(m));
        currentMarkers = [];
        
        const filtered = kamulastirmaData.filter(rec => selectedCategories.has(rec.kategori));
        
        filtered.forEach(rec => {
            if (!rec.coordinates) return;
            const marker = L.circleMarker([rec.coordinates[1], rec.coordinates[0]], {
                radius: 8, fillColor: CATEGORY_COLORS[rec.kategori], color: "#000", weight: 1, fillOpacity: 0.8
            });
            
            marker.bindPopup(`<b>${rec.proje_adi}</b><br>Karar: ${rec.karar_sayisi}`);
            
            // VERİYE TIKLAYINCA YAKLAŞMA ÖZELLİĞİ
            marker.on('click', function() {
                map.setView(marker.getLatLng(), 12);
            });

            marker.addTo(map);
            currentMarkers.push(marker);
        });
        
        document.getElementById('statsText').innerText = `Toplam: ${filtered.length} Kayıt`;
        updateSidebarList(filtered);
    }

    function updateSidebarList(data) {
        const list = document.getElementById('recordList');
        list.innerHTML = data.map(rec => `
            <div class="record-card" style="border-left-color:${CATEGORY_COLORS[rec.kategori]}">
                <b>${rec.proje_adi}</b><br><small>${rec.tahmini_konum || ''}</small>
            </div>
        `).join('');
    }

    function buildUI() {
        const filters = document.getElementById('categoryFilters');
        const select = document.getElementById('kategoriSelect');
        const legend = document.getElementById('legendContainer');
        
        Object.keys(CATEGORY_COLORS).forEach(cat => {
            filters.innerHTML += `<label class="filter-checkbox"><input type="checkbox" checked onchange="toggleCat('${cat}', this.checked)"> ${cat}</label>`;
            select.innerHTML += `<option value="${cat}">${cat}</option>`;
            legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${CATEGORY_COLORS[cat]}"></div>${cat}</div>`;
        });
    }

    window.toggleCat = (cat, isChecked) => {
        isChecked ? selectedCategories.add(cat) : selectedCategories.delete(cat);
        updateMap();
    };

    function listenToFirebase() {
        recordsRef.on('value', snapshot => {
            const val = snapshot.val();
            kamulastirmaData = val ? Object.entries(val).map(([k, v]) => ({...v, firebaseKey: k})) : [];
            updateMap();
        });
    }

    // Admin Fonksiyonları
    document.getElementById('loginBtn').onclick = () => {
        if(prompt("Şifre:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminControls').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loginBtn').classList.add('hidden');
        }
    };

    document.getElementById('logoutBtn').onclick = () => location.reload();

    // Başlat
    initMap();
    buildUI();
    listenToFirebase();
</script>
</body>
</html>
