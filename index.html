<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Acele Kamulaştırma Haritası | Pro v3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #1a2533; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 3; height: 100%; }
        .sidebar { flex: 1; background: white; border-left: 1px solid #ddd; overflow-y: auto; padding: 15px; min-width: 320px; }
        
        /* İstatistik Paneli */
        .stats-panel { background: #eef2f7; border-radius: 8px; padding: 10px; margin-bottom: 15px; border-left: 4px solid #3498db; }
        .city-item { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 3px 0; border-bottom: 1px solid #ddd; }
        
        .record-card { background: #fff; border: 1px solid #eee; border-left: 5px solid #3498db; padding: 10px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .record-card:hover { background: #f9fbff; transform: scale(1.01); }
        .admin-section { background: #fff3e0; padding: 10px; border-radius: 8px; border: 1px dashed #fb8c00; margin-top: 15px; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn { border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #3498db; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar">
        <h3>🏗️ Kamulaştırma Portalı</h3>
        <div id="statsCount">Veriler yükleniyor...</div>
        <div>
            <button class="btn btn-blue" id="loginBtn">🔐 Admin</button>
            <button class="btn" id="logoutBtn" style="background:#e74c3c; color:white;" class="hidden" onclick="location.reload()">Çıkış</button>
        </div>
    </div>

    <div class="main-content">
        <div id="map"></div>
        <div class="sidebar">
            <h4>📊 Şehir İstatistikleri</h4>
            <div id="cityStats" class="stats-panel">Henüz veri yok...</div>

            <h4>🔍 Filtrele</h4>
            <div id="categoryFilters" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; font-size:0.8rem; margin-bottom:15px;"></div>

            <h4>📌 Karar Listesi</h4>
            <div id="recordList"></div>

            <div id="adminControls" class="admin-section hidden">
                <h4>✍️ Yeni Karar / Poligon Ekle</h4>
                <p style="font-size:0.75rem; color:#666;">Haritadaki çizim araçlarını kullanarak alan çizebilir veya koordinat girebilirsiniz.</p>
                <input type="text" id="projeAdi" placeholder="Proje Adı">
                <input type="text" id="kararNo" placeholder="Karar Sayısı">
                <input type="text" id="sehirInput" placeholder="İl (Örn: Antalya)">
                <input type="text" id="coordsInput" placeholder="Koordinatlar (Çizimle otomatik dolar)">
                <select id="kategoriSelect"></select>
                <button class="btn btn-blue" style="width:100%; margin-top:10px;" id="saveBtn">💾 Veritabanına Yaz</button>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // --- FIREBASE AYARLARINIZ ---
    const firebaseConfig = {
        apiKey: "AIzaSyCfrZFOzg_an5WBFARS_1cB4Q3pfRguz8E",
        authDomain: "acele-kumulastirma.firebaseapp.com",
        databaseURL: "https://acele-kumulastirma-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "acele-kumulastirma",
        storageBucket: "acele-kumulastirma.firebasestorage.app",
        messagingSenderId: "935988668675",
        appId: "1:935988668675:web:c934a82fbfafc7f5512136"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kamulastirma");

    const COLORS = { "Konut": "#2ecc71", "Altyapı": "#3498db", "Ulaşım": "#f39c12", "Enerji": "#e67e22", "Kentsel Dönüşüm": "#9b59b6", "Diğer": "#7f8c8d" };
    let map, kamulastirmaData = [], drawnItems, selectedCategories = new Set(Object.keys(COLORS));

    function initMap() {
        map = L.map('map');
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        
        L.control.layers({ "Harita": osm, "Uydu": satellite }).addTo(map);
        map.fitBounds(L.latLngBounds(L.latLng(35.5, 25.5), L.latLng(42.5, 45.0)));

        // Çizim Araçları (Draw)
        drawnItems = new L.FeatureGroup().addTo(map);
        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { polygon: true, polyline: false, rectangle: true, circle: false, marker: true }
        });
        
        // Çizim bitince koordinatları forma yaz
        map.on(L.Draw.Event.CREATED, (e) => {
            const layer = e.layer;
            drawnItems.addLayer(layer);
            const geojson = layer.toGeoJSON();
            document.getElementById('coordsInput').value = JSON.stringify(geojson.geometry.coordinates);
        });
    }

    function updateView() {
        // Haritayı temizle
        map.eachLayer(l => { if(!!l.toGeoJSON && l !== drawnItems) map.removeLayer(l); });

        const filtered = kamulastirmaData.filter(d => selectedCategories.has(d.kategori));
        const cityCounts = {};

        filtered.forEach(d => {
            // Şehir İstatistiği Hesabı
            const city = d.tahmini_konum || "Belirsiz";
            cityCounts[city] = (cityCounts[city] || 0) + 1;

            // Haritaya Ekleme (Nokta veya Poligon)
            let layer;
            if(Array.isArray(d.coordinates[0])) { // Poligon durumu
                layer = L.geoJSON({ type: "Feature", geometry: { type: "Polygon", coordinates: d.coordinates } }, {
                    style: { color: COLORS[d.kategori], fillOpacity: 0.5 }
                });
            } else { // Nokta durumu
                layer = L.circleMarker([d.coordinates[1], d.coordinates[0]], { radius: 8, fillColor: COLORS[d.kategori], color: "#000", fillOpacity: 0.8 });
            }

            layer.bindPopup(`<b>${d.proje_adi}</b><br>Karar No: ${d.karar_no || d.karar_sayisi}<br><a href="https://www.resmigazete.gov.tr/eskiler/ara.php" target="_blank">Resmî Gazete'de Ara</a>`);
            layer.on('click', () => map.setView(layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng(), 12));
            layer.addTo(map);
        });

        // UI Güncelle
        document.getElementById('cityStats').innerHTML = Object.entries(cityCounts)
            .sort((a,b) => b[1] - a[1])
            .map(([c, n]) => `<div class="city-item"><span>${c}</span><b>${n}</b></div>`).join('');
        
        document.getElementById('recordList').innerHTML = filtered.map(d => `
            <div class="record-card" style="border-left-color:${COLORS[d.kategori]}">
                <b>${d.proje_adi}</b><small>${d.tahmini_konum || ''} - ${d.kategori}</small>
            </div>
        `).join('');
    }

    // Admin Girişi
    document.getElementById('loginBtn').onclick = () => {
        if(prompt("Şifre:") === "admin123") {
            document.getElementById('adminControls').classList.remove('hidden');
            map.addControl(new L.Control.Draw({ edit: { featureGroup: drawnItems } }));
        }
    };

    // Kaydetme
    document.getElementById('saveBtn').onclick = async () => {
        const coords = JSON.parse(document.getElementById('coordsInput').value);
        await db.push({
            proje_adi: document.getElementById('projeAdi').value,
            karar_no: document.getElementById('kararNo').value,
            tahmini_konum: document.getElementById('sehirInput').value,
            coordinates: coords,
            kategori: document.getElementById('kategoriSelect').value
        });
        alert("Başarıyla Kaydedildi!");
        location.reload();
    };

    // Başlatıcılar
    initMap();
    Object.keys(COLORS).forEach(c => {
        document.getElementById('categoryFilters').innerHTML += `<label><input type="checkbox" checked onchange="toggleCat('${c}', this.checked)"> ${c}</label>`;
        document.getElementById('kategoriSelect').innerHTML += `<option value="${c}">${c}</option>`;
    });
    window.toggleCat = (c, s) => { s ? selectedCategories.add(c) : selectedCategories.delete(c); updateView(); };
    db.on('value', s => { 
        const v = s.val(); 
        kamulastirmaData = v ? Object.values(v) : []; 
        updateView(); 
    });

</script>
</body>
</html>
