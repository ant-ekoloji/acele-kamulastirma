<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acele Kamulaştırma Kararları - Türkiye</title>
    <!-- Leaflet CSS ve JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster CSS ve JS (nokta gruplama için) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
        }
        .custom-popup .popup-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .custom-popup p {
            margin: 4px 0;
            font-size: 13px;
        }
        .custom-popup strong {
            color: #e67e22;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        🗺️ Acele Kamulaştırma Kararları (2025-2026) | Toplam: <span id="totalCount">0</span> karar
    </div>
    <div id="map"></div>

    <script>
        // GeoJSON verisi (oluşturduğumuz kaydırılmış noktalar)
        const kamulastirmaData = {
  "type": "FeatureCollection",
  "features": [
    {
      "type": "Feature",
      "geometry": {
        "type": "Point",
        "coordinates": [
          27.269185329039703,
          37.86212328663935
        ]
      },
      "properties": {
        "id": "-OooPIZkVrI3MqJoxjaL",
        "kurum": "Devlet Su İşleri Genel Müdürlüğü",
        "karar_no": "11111",
        "kategori": "Enerji",
        "proje": "Kuşadası-Söke İçmesuyu Projesi Kapsamındaki Kuşadası-Söke ve Yöresi İçmesuyu İsale Hattının ve Arıtma Tesisinin Yapımı Amacıyla Bazı Taşınmazların Devlet Su İşleri Genel Müdürlüğü Tarafından Acele Kamulaştırılması Hakkında Karar",
        "resmi_gazete": "33206",
        "tarih": "27.03.2026",
        "tahmini_konum": "Kuşadası"
      }
    },
    {
      "type": "Feature",
      "geometry": {
        "type": "Point",
        "coordinates": [
          34.966990379418,
          40.55843942233568
        ]
      },
      "properties": {
        "id": "-OooPI_qXuvE_uTsJGeJ",
        "kurum": "Türkiye Elektrik İletim Anonim Şirketi Genel Müdürlüğü",
        "karar_no": "11113",
        "kategori": "Enerji",
        "proje": "154 kV Hitit TM (Çorum-1) TM İrtibatları Enerji İletim Hattı Projesi Adı Altında Yer Alan 154 kV Çorum-Çankırı Enerji İletim Hattı Kısmi Güzergâhı Projesi Kapsamında Bazı Taşınmazların Türkiye Elektrik İletim Anonim Şirketi Genel Müdürlüğü Tarafından Acele Kamulaştırılması Hakkında Karar",
        "resmi_gazete": "33206",
        "tarih": "27.03.2026",
        "tahmini_konum": "Çorum"
      }
    }
    // Not: Dosya boyutu sınırlaması nedeniyle burada yalnızca ilk 2 örnek gösterilmiştir.
    // Gerçek uygulamada, aşağıdaki gibi tüm veriyi (40+ madde) buraya eklemelisiniz.
    // Alternatif: Veriyi ayrı bir data.js veya data.json dosyasından çekmek daha sağlıklı olur.
  ]
};

        // Haritayı başlat (Türkiye merkez)
        var map = L.map('map').setView([39.0, 35.0], 6);

        // Temel harita katmanı (OpenStreetMap)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
            minZoom: 6
        }).addTo(map);

        // Marker Cluster grubu oluştur (noktaları yakınlaşma seviyesine göre gruplar)
        var markers = L.markerClusterGroup({
            spiderfyOnMaxZoom: true,  // Tıklayınca yakın noktaları örümcek ağı gibi açar
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            maxClusterRadius: 50     // Gruplama mesafesi (piksel)
        });

        // Toplam nokta sayısını tutmak için
        let totalFeatures = kamulastirmaData.features.length;
        document.getElementById('totalCount').innerText = totalFeatures;

        // Her bir nokta için işaretleyici ve popup oluştur
        kamulastirmaData.features.forEach(function(feature) {
            var coords = feature.geometry.coordinates;
            var props = feature.properties;
            
            // Popup içeriği (HTML)
            var popupContent = `
                <div class="custom-popup" style="min-width: 250px; max-width: 350px;">
                    <div class="popup-title">📌 ${props.tahmini_konum || 'Konum belirsiz'}</div>
                    <p><strong>🏛️ Kurum:</strong> ${props.kurum || '-'}</p>
                    <p><strong>📄 Karar No:</strong> ${props.karar_no || '-'}</p>
                    <p><strong>🗂️ Kategori:</strong> ${props.kategori || '-'}</p>
                    <p><strong>📅 Tarih:</strong> ${props.tarih || '-'}</p>
                    <p><strong>📰 Resmi Gazete:</strong> ${props.resmi_gazete || '-'}</p>
                    <p><strong>📖 Proje:</strong> ${props.proje ? props.proje.substring(0, 100) + '...' : '-'}</p>
                    <hr>
                    <p style="font-size: 11px; color: gray;">ID: ${props.id || '-'}</p>
                </div>
            `;
            
            // İşaretleyici oluştur (varsayılan mavi marker)
            var marker = L.marker([coords[1], coords[0]]);
            marker.bindPopup(popupContent, { maxWidth: 400, minWidth: 250 });
            markers.addLayer(marker);
        });

        // Cluster grubunu haritaya ekle
        map.addLayer(markers);

        // İsteğe bağlı: Haritaya ölçek çubuğu ekle
        L.control.scale({ metric: true, imperial: false }).addTo(map);
        
        // Konsola bilgi yazdır
        console.log(`${totalFeatures} adet kamulaştırma noktası haritaya yüklendi.`);
    </script>
</body>
</html>
